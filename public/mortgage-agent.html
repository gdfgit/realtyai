// ═══ handleFile — convert to base64 immediately, then auto-advance ═══
async function handleFile(e){
  const files=Array.from(e.target.files);
  if(!files.length)return;
  const fields=af(S.secIdx,S.data),cf=fields[S.fldIdx];
  const converted=[];
  for(const file of files){
    try{
      const b64=await new Promise((resolve,reject)=>{
        const reader=new FileReader();
        reader.onload=()=>resolve(reader.result.split(',')[1]);
        reader.onerror=reject;
        reader.readAsDataURL(file);
      });
      converted.push({name:file.name, data:b64, mimeType:file.type||'application/octet-stream', size:file.size});
      console.log('File captured:',file.name,'('+file.size+' bytes, b64:'+b64.length+' chars)');
    }catch(err){
      console.error('Failed to read file:',file.name,err);
    }
  }
  S.files[cf.key]=[...(S.files[cf.key]||[]),...converted];
  addUser('📎 '+converted.map(f=>f.name).join(', '));
  addAgent(`Received ${converted.length} file(s) ✓`,200).then(()=>{S.fldIdx++;askNext(S.secIdx,S.fldIdx,S.data);});
}

S.data[cf.key]=v;const disp=cf.sensitive?'•••••'+v.slice(-4):v;await addAgent(`**${cf.label}**: ${disp} ✓`,200,cf.key);const naf=af(S.secIdx,S.data),nfi=S.fldIdx+1;if(nfi<naf.length){S.fldIdx=nfi;setTimeout(()=>askNext(S.secIdx,nfi,S.data),300);}else{
let nsi=S.secIdx+1;
while(nsi<SECTIONS.length){

}}}}

}

  units:S.data.numUnits,
  subjectPropertyAddressStreet:S.data.propertyStreet,
  subjectPropertyAddressCity:S.data.propertyCity,
  subjectPropertyAddressState:S.data.propertyState,
  subjectPropertyAddressZipCode:S.data.propertyZip,
  loanOfficerEmail:'gdifazio@nexalending.com',
  loanOfficerNmlsId:'1913560',
  note:richNote,
  isJoint:isJoint?'true':'false'
};
if(isJoint){
  payload.coBorrowerFirstName=S.data.coFirstName;
  payload.coBorrowerLastName=S.data.coLastName;
  payload.coBorrowerEmail=S.data.coEmail;
  payload.coBorrowerSsn=S.data.coSsn;
  payload.coBorrowerBirthDate=S.data.coDob;
  payload.coBorrowerMobilePhone=cleanPhone(S.data.coCellPhone);
  payload.coBorrowerCurrentAddressStreet=coAddr?S.data.currentStreet:S.data.coCurrentStreet;
  payload.coBorrowerCurrentAddressCity=coAddr?S.data.currentCity:S.data.coCurrentCity;
  payload.coBorrowerCurrentAddressState=coAddr?S.data.currentState:S.data.coCurrentState;
  payload.coBorrowerCurrentAddressZipCode=coAddr?S.data.currentZip:S.data.coCurrentZip;
} else {
  payload.coBorrowerFirstName='N/A';
  payload.coBorrowerLastName='N/A';
}
const params=new URLSearchParams(payload);
const res=await fetch('https://hooks.zapier.com/hooks/catch/23175236/up1kjr5/',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:params.toString()});
if(!res.ok)throw new Error('Webhook failed: '+res.status);
const result=await res.json().catch(()=>({}));
const ln=result.id||('RA'+Date.now().toString().slice(-6));
await sendDocsEmail(ln,isJoint);
S.result={ln};S.submitted=true;S.submitting=false;
await addAgent(`🎉 **Application Submitted!**\n\nLoan **#${ln}** created in LendingPad.\n\nReviewing against **250+ lenders** for the best rate. Expect a call within 15 minutes.`);
}catch(err){
console.error('Submit error:',err);
S.submitting=false;
await addAgent(`⚠️ There was an issue submitting. Please try again or contact your loan officer directly at ${LO.phone}.`);
render();
}}

// ═══════════════════════════════════════════════════════════
// FIX #2: sendDocsEmail — files are already base64 from handleFile
// No more fileToBase64() needed — data is pre-converted
// ═══════════════════════════════════════════════════════════
async function sendDocsEmail(loanId,isJoint){
  try{
    emailjs.init('xElMdZFRvZqh8-bIw');
    const allFiles=Object.entries(S.files);
    let driveLink='';
    let docList='No documents uploaded — follow up with borrower.';
    // ═══ Upload files to Google Drive via Netlify function ═══
    if(allFiles.length>0){
      // Files are already {name, data (base64), mimeType, size} from handleFile
      const filesToUpload=[];
      for(const[key,files] of allFiles){
        for(const file of files){
          const prefix=key.startsWith('co')?'CoBorrower_':'Borrower_';
          if(file.data){
            filesToUpload.push({name:prefix+file.name, data:file.data, mimeType:file.mimeType||'application/octet-stream'});
            console.log('Queued for upload:',prefix+file.name,'('+file.data.length+' b64 chars)');
          }else{
            console.warn('Skipping file with no data:',file.name);
          }
        }
      }
      if(filesToUpload.length>0){
        console.log('Uploading',filesToUpload.length,'file(s) to Google Drive...');
        try{
          const uploadRes=await fetch('/.netlify/functions/upload-docs',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
              borrowerName:S.data.firstName+' '+S.data.lastName,
              loanId:loanId,
              files:filesToUpload,
            }),
          });
          const uploadResult=await uploadRes.json();
          console.log('Upload result:',uploadResult);
          if(uploadResult.success){
            driveLink=uploadResult.folderLink||'';
            docList='✅ '+uploadResult.count+' document(s) uploaded to Google Drive\n';
            docList+='📁 Folder: '+uploadResult.folderName+'\n';
            docList+='🔗 '+driveLink+'\n\n';
            uploadResult.files.forEach(f=>{
              docList+='  • '+(f.error?'❌ '+f.name+' ('+f.error+')':'✅ '+f.name)+'\n';
            });
          }else{
            console.error('Upload failed:',uploadResult.error);
            docList='⚠️ Upload failed: '+(uploadResult.error||'unknown')+'\nFile names listed below — follow up with borrower.\n';
            filesToUpload.forEach(f=>{docList+='  • '+f.name+'\n';});
          }
        }catch(uploadErr){
          console.error('Drive upload error:',uploadErr);
          docList='⚠️ Drive upload unavailable. File names:\n';
          filesToUpload.forEach(f=>{docList+='  • '+f.name+'\n';});
        }
      }
    }
    // ═══ Build employment details ═══
    let empDetails='';
    empDetails+='Employer: '+(S.data.employerName||'N/A')+'\n';
    empDetails+='Position: '+(S.data.jobTitle||'N/A')+'\n';
    empDetails+='Years in field: '+(S.data.yearsInLine||'N/A')+'\n';
    empDetails+='Self-employed: '+(S.data.isSelfEmployed||'N/A')+'\n';
    empDetails+='Monthly base: $'+(S.data.monthlyBase||'0')+'\n';
    if(S.data.monthlyOvertime&&S.data.monthlyOvertime!=='skip')empDetails+='Overtime: $'+S.data.monthlyOvertime+'\n';
    if(S.data.monthlyBonus&&S.data.monthlyBonus!=='skip')empDetails+='Bonus: $'+S.data.monthlyBonus+'\n';
    if(S.data.monthlyCommission&&S.data.monthlyCommission!=='skip')empDetails+='Commission: $'+S.data.monthlyCommission+'\n';
    if(isJoint){
      empDetails+='\nCO-BORROWER EMPLOYMENT:\n';
      empDetails+='Employer: '+(S.data.coEmployerName||'N/A')+'\n';
      empDetails+='Position: '+(S.data.coJobTitle||'N/A')+'\n';
      empDetails+='Years in field: '+(S.data.coYearsInLine||'N/A')+'\n';
      empDetails+='Self-employed: '+(S.data.coIsSelfEmployed||'N/A')+'\n';
      empDetails+='Monthly base: $'+(S.data.coMonthlyBase||'0')+'\n';
    }
    // ═══ Build financial details ═══
    let finDetails='';
    finDetails+='ASSETS:\n';
    finDetails+='Account: '+(S.data.assetType1||'N/A')+(S.data.assetInstitution1?' at '+S.data.assetInstitution1:'')+'\n';
    finDetails+='Balance: $'+(S.data.assetValue1||'0')+'\n';
    finDetails+='\nLIABILITIES:\n';
    if(S.data.hasLiabilities==='No'){finDetails+='No debts reported\n';}
    else{
      finDetails+='Debt type: '+(S.data.liabType1||'N/A')+'\n';
      finDetails+='Creditor: '+(S.data.liabCompany1||'N/A')+'\n';
      finDetails+='Balance: $'+(S.data.liabBalance1||'0')+'\n';
      finDetails+='Monthly payment: $'+(S.data.liabPayment1||'0')+'\n';
    }
    finDetails+='\nDECLARATIONS:\n';
    finDetails+='Primary residence: '+(S.data.willOccupy||'N/A')+'\n';
    finDetails+='Judgments: '+(S.data.judgments||'N/A')+'\n';
    finDetails+='Foreclosure (7yr): '+(S.data.foreclosure||'N/A')+'\n';
    finDetails+='Bankruptcy (7yr): '+(S.data.bankruptcy||'N/A')+'\n';
    finDetails+='Military service: '+(S.data.milService||'N/A')+'\n';
    // ═══ Build loan details ═══
    let loanDetails='';
    loanDetails+='Property: '+(S.data.propertyStreet||'TBD')+', '+(S.data.propertyCity||'')+' '+(S.data.propertyState||'')+' '+(S.data.propertyZip||'')+'\n';
    loanDetails+='Purchase Price: $'+Number(S.data.propertyValue||0).toLocaleString()+'\n';
    loanDetails+='Loan Amount: $'+Number(S.data.loanAmount||0).toLocaleString()+'\n';
    loanDetails+='Loan Type: '+(S.data.financingType||'N/A')+'\n';
    loanDetails+='Occupancy: '+(S.data.occupancy||'N/A')+'\n';
    loanDetails+='Property Type: '+(S.data.propertyType||'N/A')+'\n';
    if(driveLink)loanDetails+='\n📁 DOCUMENTS: '+driveLink+'\n';
    // ═══ Send email notification ═══
    await emailjs.send('service_rh6uozl','template_42e9cbr',{
      loan_id:loanId,
      borrower_name:S.data.firstName+' '+S.data.lastName,
      borrower_email:S.data.email,
      borrower_phone:S.data.cellPhone,
      co_borrower_line:isJoint?'Co-Borrower: '+S.data.coFirstName+' '+S.data.coLastName+' | '+S.data.coEmail+' | '+S.data.coCellPhone:'Individual Application (no co-borrower)',
      document_list:docList,
      loan_details:loanDetails,
      employment_details:empDetails,
      financial_details:finDetails,
    });
    console.log('Email sent'+(driveLink?' with Drive link: '+driveLink:''));
  }catch(e){
    console.error('sendDocsEmail error:',e);
  }
}
function toggleSB(){S.sidebarOpen=!S.sidebarOpen;render();}
function navBack(){
  if(window.parent!==window){try{window.parent.postMessage('closeMortgageAgent','*');return;}catch(e){}}
  if(document.referrer)window.location.href=document.referrer;
  else window.location.href='https://realtyai.netlify.app';
}
async function init(){S.secIdx=1;S.fldIdx=0;render();setTimeout(()=>askNext(1,0,S.data),500);}
init();
</script>
