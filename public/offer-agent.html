<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offer Agent</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f7f7f7; margin:0; padding:24px; }
    .card { max-width: 760px; margin: 0 auto; background:#fff; border:1px solid #ddd; border-radius:10px; padding:20px; }
    h1 { margin-top:0; color:#222; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .full { grid-column:1 / -1; }
    label { font-size:13px; color:#444; display:block; margin-bottom:4px; }
    input, textarea { width:100%; padding:10px; border:1px solid #ccc; border-radius:8px; font-size:14px; }
    textarea { min-height:120px; resize:vertical; }
    button { margin-top:14px; background:#e31837; color:#fff; border:none; padding:11px 16px; border-radius:8px; cursor:pointer; font-weight:700; }
    button:disabled { opacity:.6; cursor:not-allowed; }
    #status { margin-top:12px; font-size:14px; white-space:pre-wrap; }
    .ok { color:#1b8c4e; }
    .err { color:#c0141f; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Offer Agent</h1>
    <p>Send offer to listing agent and confirmation to <b>natiorealtor@gmail.com</b>.</p>

    <form id="offerForm">
      <div class="grid">
        <div>
          <label for="propertyAddress">Property Address</label>
          <input id="propertyAddress" name="propertyAddress" required />
        </div>
        <div>
          <label for="offerPrice">Offer Price</label>
          <input id="offerPrice" name="offerPrice" required />
        </div>

        <div>
          <label for="buyerName">Buyer Name</label>
          <input id="buyerName" name="buyerName" required />
        </div>
        <div>
          <label for="buyerEmail">Buyer Email</label>
          <input id="buyerEmail" name="buyerEmail" required />
        </div>

        <div>
          <label for="buyerPhone">Buyer Phone</label>
          <input id="buyerPhone" name="buyerPhone" />
        </div>
        <div>
          <label for="listingAgentName">Listing Agent Name</label>
          <input id="listingAgentName" name="listingAgentName" required />
        </div>

        <div class="full">
          <label for="listingAgentEmail">Listing Agent Email</label>
          <input id="listingAgentEmail" name="listingAgentEmail" type="email" required />
        </div>

        <div class="full">
          <label for="notes">Additional Terms / Notes</label>
          <textarea id="notes" name="notes" placeholder="Any additional terms..."></textarea>
        </div>
      </div>

      <button id="sendBtn" type="submit">Send Offer Emails</button>
      <div id="status"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById("offerForm");
    const statusEl = document.getElementById("status");
    const sendBtn = document.getElementById("sendBtn");

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.className = isError ? "err" : "ok";
    }

    function buildSummary(d) {
      return [
        "RESIDENTIAL PURCHASE AGREEMENT — OFFER SUMMARY",
        "================================================",
        `Property Address: ${d.propertyAddress || ""}`,
        `Offer Price: ${d.offerPrice || ""}`,
        `Buyer Name: ${d.buyerName || ""}`,
        `Buyer Email: ${d.buyerEmail || ""}`,
        `Buyer Phone: ${d.buyerPhone || ""}`,
        `Listing Agent Name: ${d.listingAgentName || ""}`,
        `Listing Agent Email: ${d.listingAgentEmail || ""}`,
        "",
        "Additional Terms:",
        d.notes || "(none)",
        "================================================"
      ].join("\n");
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      setStatus("");
      sendBtn.disabled = true;

      const data = Object.fromEntries(new FormData(form).entries());
      data.offerSummary = buildSummary(data);
      data.subject = `Offer Notification - ${data.propertyAddress || "Property"}`;

      try {
        const res = await fetch("/.netlify/functions/send-offer-email", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        const json = await res.json();
        if (!res.ok) throw new Error(json.error || "Failed to send.");

        setStatus(
          "Success:\n" +
          "- Email sent to listing agent: " + data.listingAgentEmail + "\n" +
          "- Confirmation sent to: natiorealtor@gmail.com"
        );
        form.reset();
      } catch (err) {
        setStatus("Error: " + err.message, true);
      } finally {
        sendBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
