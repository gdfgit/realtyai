<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Listing Agent — Nation Realtor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf9f7;--card:#fff;--dark:#1a1a2e;--text:#2d2d3a;--text-mid:#6b6b7b;--text-light:#9b9bab;
  --red:#C0392B;--red-light:#e74c3c;--red-bg:rgba(192,57,43,.06);--red-bg2:rgba(192,57,43,.1);--red-border:rgba(192,57,43,.18);
  --green:#27ae60;--green-bg:rgba(39,174,96,.08);--green-border:rgba(39,174,96,.18);
  --border:rgba(0,0,0,.08);--sidebar-bg:#fcfbf9;--input-bg:#f5f4f2;
  --shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03);
  --shadow-lg:0 4px 24px rgba(0,0,0,.08);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden}
.app{display:flex;height:100dvh}

/* ── SIDEBAR ── */
.sidebar{width:290px;display:flex;flex-direction:column;background:var(--sidebar-bg);border-right:1px solid var(--border);transition:width .3s;overflow:hidden;flex-shrink:0}
.sidebar.collapsed{width:0}
.sidebar-back{display:flex;align-items:center;gap:8px;padding:14px 20px;background:none;border:none;border-bottom:1px solid var(--border);color:var(--red);cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;text-align:left;width:100%}
.sidebar-back:hover{background:var(--red-bg)}
.sb-logo{display:flex;justify-content:center;padding:18px 20px 0}
.sb-logo img{width:56px;height:56px;border-radius:12px;box-shadow:0 4px 16px rgba(192,57,43,.15)}
.s-header{padding:16px 20px 12px;border-bottom:1px solid var(--border);text-align:center}
.s-header .label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--red);font-weight:700}
.s-header h2{font-size:18px;font-weight:700;color:var(--dark);margin-top:2px}
.s-header .sub{font-size:11px;color:var(--text-light);margin-top:2px}
.prog{padding:14px 20px}
.prog .row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:6px}
.prog .row span:first-child{color:var(--text-mid)}
.prog .row span:last-child{color:var(--red);font-weight:700}
.prog-track{height:4px;background:var(--border);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--red-light));border-radius:4px;transition:width .4s ease}
.nav{flex:1;overflow-y:auto;padding:8px 12px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;font-size:13px;cursor:pointer;transition:all .2s;margin-bottom:2px}
.nav-item.active{background:var(--red-bg2);color:var(--red);font-weight:600}
.nav-item.complete{color:var(--green)}
.nav-item.pending{color:var(--text-light)}
.nav-item .ic{width:22px;text-align:center;font-size:14px}
.lo{padding:14px 18px;border-top:1px solid var(--border);font-size:10px;color:var(--text-light);line-height:1.5}
.lo .t{font-weight:700;color:var(--text-mid);margin-bottom:2px;font-size:11px}
.sidebar-close{position:absolute;top:12px;right:12px;background:none;border:none;font-size:20px;color:var(--text-mid);cursor:pointer;z-index:101}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:99}
.sidebar-overlay.show{display:block}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{padding:10px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--card)}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-title{font-size:14px;font-weight:600;color:var(--dark)}
.topbar-sub{font-size:11px;color:var(--text-light)}
.topbar-badge{background:var(--red-bg);padding:5px 12px;border-radius:16px;font-size:11px;color:var(--red);font-weight:600}
.menu-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--dark);padding:5px 9px;cursor:pointer;font-size:15px;display:none}

/* ── CHAT ── */
.chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px}
.msg{display:flex;gap:10px;max-width:80%;animation:fadeIn .3s ease}
.msg.agent{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.avatar{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;font-weight:700;overflow:hidden}
.msg.agent .avatar{background:var(--red);padding:0;border:none}
.msg.agent .avatar img{width:100%;height:100%;object-fit:cover;border-radius:9px}
.msg.user .avatar{background:var(--dark);color:#fff;font-size:11px}
.bubble{padding:12px 16px;border-radius:14px;font-size:13.5px;line-height:1.55;word-wrap:break-word}
.msg.agent .bubble{background:var(--card);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:4px;box-shadow:var(--shadow)}
.msg.user .bubble{background:var(--red);color:#fff;border-bottom-right-radius:4px;position:relative}
.edit-hint{font-size:10px;margin-left:6px;opacity:.5;transition:opacity .2s}
.msg.user .bubble:hover .edit-hint{opacity:1}
.bubble strong{font-weight:600}
.typing-wrap{align-self:flex-start;display:flex;gap:10px;align-items:center}
.typing-b{display:flex;gap:4px;padding:12px 18px;background:var(--card);border:1px solid var(--border);border-radius:14px;border-bottom-left-radius:4px}
.td{width:7px;height:7px;border-radius:50%;background:var(--red);opacity:.3;animation:pulse 1.2s infinite}
.td:nth-child(2){animation-delay:.2s}
.td:nth-child(3){animation-delay:.4s}

/* ── INPUT AREA ── */
.input-area{padding:14px 20px;border-top:1px solid var(--border);background:var(--card)}
.sel-opts{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.opt-btn{padding:9px 16px;border-radius:10px;border:1px solid var(--red-border);background:var(--red-bg);color:var(--red);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s}
.opt-btn:hover{background:var(--red);color:#fff;border-color:var(--red)}
.input-row{display:flex;gap:10px}
.chat-input{flex:1;padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:var(--input-bg);color:var(--dark);font-size:13.5px;outline:none;font-family:inherit;transition:border-color .2s}
.chat-input:focus{border-color:var(--red)}
.chat-input::placeholder{color:var(--text-light)}
.send-btn{padding:12px 20px;border-radius:10px;border:none;background:var(--border);color:var(--text-light);font-size:13px;font-weight:600;cursor:default;font-family:inherit;transition:all .2s}
.send-btn.active{background:var(--red);color:#fff;cursor:pointer}
.send-btn.active:hover{background:var(--red-light)}
.skip-btn{padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text-light);font-size:11px;cursor:pointer;font-family:inherit}
.skip-btn:hover{border-color:var(--red-border);color:var(--red)}
.disclaimer{text-align:center;font-size:10px;color:var(--text-light);margin-top:8px}

/* ── FILE UPLOAD ── */
.file-row{display:flex;gap:8px;margin-bottom:8px}
.upload-btn{padding:10px 18px;border-radius:10px;border:1px dashed var(--red-border);background:var(--red-bg);color:var(--red);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;flex:1}
.upload-btn:hover{background:var(--red-bg2)}
.file-skip-btn{padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text-light);font-size:12px;cursor:pointer;font-family:inherit}
.file-list{display:flex;flex-direction:column;gap:4px;margin-top:6px}
.file-item{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--input-bg);border-radius:8px;font-size:12px;color:var(--text-mid)}
.file-item .file-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;padding:0 4px}

/* ── REVIEW / SUCCESS ── */
.review-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin:12px 0;box-shadow:var(--shadow)}
.review-card h3{font-size:16px;font-weight:700;color:var(--dark);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.rv-section{margin-bottom:14px}
.rv-section .rv-title{font-size:12px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.rv-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid rgba(0,0,0,.04)}
.rv-row .rv-label{color:var(--text-mid)}
.rv-row .rv-val{color:var(--dark);font-weight:500;text-align:right;max-width:60%}
.review-actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.btn-primary{padding:12px 24px;border-radius:10px;border:none;background:var(--red);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-primary:hover{background:var(--red-light)}
.btn-outline{padding:12px 18px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text-mid);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-outline:hover{border-color:var(--red-border);color:var(--red)}
.success-card{text-align:center;padding:30px 20px;animation:fadeIn .5s ease}
.success-card .check{width:56px;height:56px;border-radius:50%;background:var(--green-bg);color:var(--green);font-size:28px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;border:2px solid var(--green-border)}
.success-card h3{font-size:18px;font-weight:700;color:var(--dark);margin-bottom:8px}
.success-card p{font-size:13px;color:var(--text-mid);line-height:1.5}
.success-actions{display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap}

/* ── PROPERTY BANNER ── */
.prop-banner{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--red-bg);border:1px solid var(--red-border);border-radius:12px;margin-bottom:8px}
.prop-icon{width:38px;height:38px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0}
.prop-info{font-size:12px;color:var(--text-mid);line-height:1.4}
.prop-info strong{color:var(--dark);display:block;font-size:13px}

/* ── MIC ── */
.mic-btn{width:44px;height:44px;border-radius:50%;border:none;background:var(--red);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(192,57,43,.3)}
.mic-btn:hover{background:var(--red-light);box-shadow:0 4px 14px rgba(192,57,43,.4)}
.mic-btn.listening{animation:micPulse 1.5s infinite}
.mic-btn svg path{fill:#fff}
.mic-btn svg path[stroke]{stroke:#fff;fill:none}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.4)}50%{box-shadow:0 0 0 12px rgba(192,57,43,0)}}

/* ── EDIT BTN ── */
.edit-btn{display:inline-block;margin-left:8px;padding:2px 8px;border-radius:6px;border:1px solid var(--red-border);background:var(--red-bg);color:var(--red);font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;vertical-align:middle;transition:all .2s}
.edit-btn:hover{background:var(--red);color:#fff}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1.1)}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

@media(max-width:768px){
  .sidebar{position:fixed;z-index:100;height:100dvh;width:0;overflow:hidden}
  .sidebar.show-mobile{width:280px}
  .menu-btn{display:block}
  .bubble{max-width:88%!important}
  .msg{max-width:88%}
}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
// ═════════════════════════════════════════════════════════════════
//  LISTING AGENT — Residential Real Estate Listing
//  Nation Realtor / Axen Realty
// ═════════════════════════════════════════════════════════════════

const AGENT_INFO = {
  broker: "Axen Realty",
  agentName: "Giancarlo Di Fazio",
  license: "DRE 02153044 | NV S.0185040",
  phone: "(949) 312-0103",
  email: "gdifaziorealtor@gmail.com",
  brokerageAddress: "8945 W. Russell Rd Suite 170, Las Vegas, NV 89148",
};

const EMAILJS_PUBLIC_KEY = "xElMdZFRvZqh8-bIw";
const EMAILJS_SERVICE_ID = "service_rh6uozl";
const EMAILJS_TEMPLATE_ID = "template_o678r3s";
const GDRIVE_FOLDER_ID = "1FYBpGWC0_qldmWzVVUahBYxFH0gSY6xN";

// ─── Shared context from Property Card (if launched from dashboard) ───
const SHARED_CTX = (() => {
  const p = new URLSearchParams(window.location.search);
  return {
    propertyAddress: p.get('address') || '',
    propertyCity: p.get('city') || '',
    propertyState: p.get('state') || 'NV',
    propertyZip: p.get('zip') || '',
    listingPrice: p.get('price') || '',
    apn: p.get('apn') || '',
  };
})();

window.addEventListener('message', (e) => {
  if (e.data?.type === 'SHARED_CONTEXT') {
    Object.assign(SHARED_CTX, e.data.payload);
    init();
  }
});

// ═══════════════════════════════════════════════════════════════
//  SECTION & FIELD DEFINITIONS
// ═══════════════════════════════════════════════════════════════
const SECTIONS = [
  // ─── 0: Welcome ───
  { id:"welcome", title:"Welcome", icon:"👋", fields:[], greeting:true },

  // ─── 1: Seller Information ───
  { id:"seller", title:"Seller Information", icon:"👤", fields:[
    { key:"sellerName", label:"Seller Full Name(s)", type:"text", req:true,
      q:"Let's set up your listing! What is the **full legal name** of the property owner(s)?" },
    { key:"addlSellers", label:"Additional Owners?", type:"select", opts:["No","Yes"], req:true,
      q:"Are there additional owners on this property?" },
    { key:"addlSellerNames", label:"Additional Owner Names", type:"text", req:false,
      cond: d => d.addlSellers === "Yes",
      q:"Please list all additional owner name(s)." },
    { key:"sellerEntityType", label:"Entity Type", type:"select",
      opts:["Individual","Married Couple","Trust","LLC","Corporation","Estate","Other"], req:true,
      q:"Is the seller an individual, married couple, trust, LLC, or other entity?" },
    { key:"sellerEntityName", label:"Entity Name", type:"text", req:false,
      cond: d => ["Trust","LLC","Corporation","Estate","Other"].includes(d.sellerEntityType),
      q:"What is the legal entity name?" },
    { key:"sellerPhone", label:"Seller Phone", type:"text", req:true,
      q:"Best phone number for the seller?" },
    { key:"sellerEmail", label:"Seller Email", type:"text", req:true,
      q:"Seller's email address?" },
    { key:"sellerMailAddr", label:"Seller Mailing Address", type:"text", req:false,
      q:"Seller's mailing address (if different from property)? Skip if same." },
  ]},

  // ─── 2: Property Details ───
  { id:"property", title:"Property Details", icon:"🏠", fields:[
    { key:"propAddress", label:"Property Address", type:"text", req:true,
      q:"What is the **property address**?",
      prefill: () => SHARED_CTX.propertyAddress },
    { key:"propCity", label:"City", type:"text", req:true, q:"City?",
      prefill: () => SHARED_CTX.propertyCity },
    { key:"propState", label:"State", type:"text", req:true, q:"State?",
      prefill: () => SHARED_CTX.propertyState || "NV" },
    { key:"propZip", label:"ZIP Code", type:"text", req:true, q:"ZIP Code?",
      prefill: () => SHARED_CTX.propertyZip },
    { key:"propCounty", label:"County", type:"text", req:true,
      q:"What county is the property in? (e.g., Clark)" },
    { key:"apn", label:"APN (Assessor's Parcel Number)", type:"text", req:false,
      q:"APN (Assessor's Parcel Number)? Skip if unknown.",
      prefill: () => SHARED_CTX.apn },
    { key:"propType", label:"Property Type", type:"select",
      opts:["Single Family","Condo/Townhome","Manufactured/Mobile","Multi-Family (2-4 units)","Vacant Land","Other"], req:true,
      q:"What type of property is this?" },
    { key:"yearBuilt", label:"Year Built", type:"text", req:false,
      q:"Year the property was built? (Skip if unknown)" },
    { key:"sqft", label:"Square Footage", type:"text", req:true,
      q:"Approximate **square footage** of living space?" },
    { key:"lotSize", label:"Lot Size", type:"text", req:false,
      q:"Lot size (sq ft or acres)? Skip if condo/townhome." },
    { key:"bedrooms", label:"Bedrooms", type:"text", req:true, q:"Number of **bedrooms**?" },
    { key:"bathrooms", label:"Bathrooms", type:"text", req:true, q:"Number of **bathrooms**?" },
    { key:"garage", label:"Garage", type:"select",
      opts:["None","1-Car","2-Car","3-Car","4+ Car","Carport"], req:true,
      q:"Garage type?" },
    { key:"pool", label:"Pool", type:"select", opts:["No","Yes — Private","Yes — Community"], req:false,
      q:"Does the property have a pool?" },
    { key:"stories", label:"Stories", type:"select", opts:["1","2","3+"], req:false,
      q:"How many stories?" },
  ]},

  // ─── 3: Listing Price & Terms ───
  { id:"pricing", title:"Listing Price & Terms", icon:"💰", fields:[
    { key:"listPrice", label:"Listing Price", type:"text", req:true,
      q:"What is the **listing price**?",
      prefill: () => SHARED_CTX.listingPrice },
    { key:"priceStrategy", label:"Price Strategy", type:"select",
      opts:["Firm — priced at market value","Aspirational — above market, room to negotiate","Competitive — below market to attract multiple offers","Auction / Best & Final by date"], req:false,
      q:"What's the pricing strategy?" },
    { key:"minimumAcceptable", label:"Minimum Acceptable Price", type:"text", req:false,
      q:"Is there a **minimum acceptable price** the seller will consider? (Skip if flexible)" },
    { key:"sellerMotivation", label:"Seller Motivation", type:"select",
      opts:["Standard sale","Relocation — need quick close","Estate / Probate","Divorce","Financial hardship","Upgrading / Downsizing","Investment exit"], req:false,
      q:"What's the seller's motivation? This helps tailor the marketing approach." },
  ]},

  // ─── 4: Commission & Compensation ───
  { id:"commission", title:"Commission & Compensation", icon:"💼", fields:[
    { key:"listingCommission", label:"Listing Agent Commission %", type:"text", req:true,
      q:"What is the **listing agent commission** percentage? (e.g., 3%)" },
    { key:"buyerBrokerComp", label:"Buyer Broker Compensation Offer", type:"select",
      opts:["Yes — offer compensation","No — buyer pays their own broker"], req:true,
      q:"Will the seller offer **compensation to the buyer's broker**?" },
    { key:"buyerBrokerPercent", label:"Buyer Broker %", type:"text", req:false,
      cond: d => d.buyerBrokerComp === "Yes — offer compensation",
      q:"What percentage to offer the buyer's broker? (e.g., 2.5%)" },
    { key:"commissionNotes", label:"Commission Notes", type:"text", req:false,
      q:"Any special commission terms or notes? (Skip if standard)" },
  ]},

  // ─── 5: Listing Period ───
  { id:"period", title:"Listing Period", icon:"📅", fields:[
    { key:"listingStartDate", label:"Listing Start Date", type:"text", req:true,
      q:"When should the listing **start**? (e.g., 04/01/2026 or 'ASAP')" },
    { key:"listingEndDate", label:"Listing End Date", type:"text", req:true,
      q:"When should the listing **expire**? (e.g., 10/01/2026 — standard is 6 months)" },
    { key:"autoRenewal", label:"Auto-Renewal", type:"select",
      opts:["No auto-renewal","Yes — renew for additional 90 days","Yes — renew for additional 6 months"], req:true,
      q:"Should the listing **auto-renew** if not sold by the expiration date?" },
    { key:"withdrawalTerms", label:"Early Withdrawal", type:"select",
      opts:["Standard — seller may cancel with written notice","Lock-in — no early cancellation","Custom terms"], req:false,
      q:"Early withdrawal / cancellation terms?" },
    { key:"withdrawalCustom", label:"Custom Withdrawal Terms", type:"text", req:false,
      cond: d => d.withdrawalTerms === "Custom terms",
      q:"Describe the custom cancellation terms." },
  ]},

  // ─── 6: Property Condition & Disclosures ───
  { id:"disclosures", title:"Condition & Disclosures", icon:"📋", fields:[
    { key:"propCondition", label:"Overall Condition", type:"select",
      opts:["Excellent — move-in ready","Good — minor cosmetic updates","Fair — needs some repairs","Fixer-upper — significant work needed","As-Is"], req:true,
      q:"What is the **overall condition** of the property?" },
    { key:"knownIssues", label:"Known Material Defects", type:"text", req:false,
      q:"Are there any **known material defects**? (Roof, foundation, plumbing, electrical, HVAC, pest issues, etc.) Skip if none." },
    { key:"sellerDisclosure", label:"Seller Disclosure Form", type:"select",
      opts:["Will provide — Seller Real Property Disclosure","Exempt (trust, estate, REO)","To be determined"], req:true,
      q:"Will the seller provide the **Seller Real Property Disclosure** form?" },
    { key:"leadPaint", label:"Lead-Based Paint", type:"select",
      opts:["Required — built before 1978","Not required — built 1978 or later"], req:true,
      q:"Is a **lead-based paint disclosure** required? (Required for homes built before 1978)" },
    { key:"hoa", label:"HOA", type:"select", opts:["No HOA","Yes"], req:true,
      q:"Is the property subject to an **HOA (Homeowners Association)**?" },
    { key:"hoaName", label:"HOA Name", type:"text", req:false,
      cond: d => d.hoa === "Yes",
      q:"HOA name?" },
    { key:"hoaDues", label:"Monthly HOA Dues", type:"text", req:false,
      cond: d => d.hoa === "Yes",
      q:"Monthly HOA dues amount?" },
    { key:"hoaIncludes", label:"HOA Includes", type:"text", req:false,
      cond: d => d.hoa === "Yes",

//  STATE — with localStorage persistence
// ═══════════════════════════════════════════════════════════════
const STORAGE_KEY = 'realtyai_listing_state';

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      return {
        secIdx: parsed.secIdx || 0,
        fldIdx: parsed.fldIdx || 0,
        msgs: parsed.msgs || [],
        data: parsed.data || {},
        files: parsed.files || {},
        typing: false,
        submitting: false,
        submitted: parsed.submitted || false,
        listening: false,
        showMobileSB: false,
      };
    }
  } catch (e) { console.error('State load error:', e); }
  return null;
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      secIdx: S.secIdx,
      fldIdx: S.fldIdx,
      msgs: S.msgs,
      data: S.data,
      files: S.files,
      submitted: S.submitted,
    }));
  } catch (e) { console.error('State save error:', e); }
}

const savedState = loadState();
const S = savedState || {
  secIdx: 0,
  fldIdx: 0,
  msgs: [],
  data: {},
  files: {},
  typing: false,
  submitting: false,
  submitted: false,
  listening: false,
  showMobileSB: false,
};

// ═══════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const fmt = v => v ? '$' + Number(String(v).replace(/[^0-9.]/g,'')).toLocaleString('en-US') : '';
const uid = () => 'm_' + Date.now() + '_' + Math.random().toString(36).substr(2,5);
const md = t => t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');

function activeF(secIdx, data) {
  const sec = SECTIONS[secIdx];
  if (!sec || !sec.fields) return [];
  return sec.fields.filter(f => {
    if (f.type === 'notice') return true;
    if (f.cond && !f.cond(data)) return false;
    return true;
  });
}

function getPercent() {
  const total = SECTIONS.filter(s => !s.greeting && !s.review).length;
  const done = Math.max(0, S.secIdx - 1);
  return Math.min(100, Math.round((done / total) * 100));
}

// ═══════════════════════════════════════════════════════════════
//  CHAT ENGINE
// ═══════════════════════════════════════════════════════════════
function addUser(text, fieldKey) {
  S.msgs.push({ id: uid(), type:'user', text, fieldKey: fieldKey || null });
  saveState();
  render();
  scrollChat();
}

function addAgent(text, delay=400) {
  return new Promise(resolve => {
    S.typing = true;
    render();
    scrollChat();
    setTimeout(() => {
      S.typing = false;
      S.msgs.push({ id: uid(), type:'agent', text });
      saveState();
      render();
      scrollChat();
      resolve();
    }, delay);
  });
}

function scrollChat() {
  setTimeout(() => {
    const el = $('chatArea');
    if (el) el.scrollTop = el.scrollHeight;
  }, 60);
}

async function askNext(secIdx, fldIdx, data) {
  const fields = activeF(secIdx, data);

  // Skip completed conditional fields
  while (fldIdx < fields.length && fields[fldIdx].type === 'notice') {
    await addAgent(md(fields[fldIdx].msg), 300);
    fldIdx++;
    S.fldIdx = fldIdx;
  }

  if (fldIdx >= fields.length) {
    // Section complete — move to next
    const nextSec = secIdx + 1;
    if (nextSec < SECTIONS.length) {
      if (SECTIONS[nextSec].review) {
        S.secIdx = nextSec;
        S.fldIdx = 0;
        saveState();
        await addAgent("Let me compile your listing for review...", 500);
        render();
        return;
      }
      S.secIdx = nextSec;
      S.fldIdx = 0;
      saveState();
      render();
      await addAgent(`Great! Moving to **${SECTIONS[nextSec].icon} ${SECTIONS[nextSec].title}**...`, 400);
      askNext(nextSec, 0, data);
    }
    return;
  }

  const cf = fields[fldIdx];

  // Check for prefill
  if (cf.prefill) {
    const pv = cf.prefill();
    if (pv) {
      S.data[cf.key] = pv;
      await addAgent(md(cf.q), 300);
      addUser(pv, cf.key);
      await addAgent(`Got it — **${pv}** ✓`, 200);
      S.fldIdx = fldIdx + 1;
      askNext(secIdx, fldIdx + 1, S.data);
      return;
    }
  }

  await addAgent(md(cf.q), 350);
  S.fldIdx = fldIdx;
  render();
  setTimeout(() => {
    const inp = $('inp');
    if (inp) inp.focus();
  }, 100);
}

// ═══════════════════════════════════════════════════════════════
//  INPUT HANDLERS
// ═══════════════════════════════════════════════════════════════
function send() {
  const inp = $('inp');
  if (!inp) return;
  const val = inp.value.trim();
  if (!val) return;
  const fields = activeF(S.secIdx, S.data);
  const cf = fields[S.fldIdx];
  if (!cf) return;
  S.data[cf.key] = val;
  addUser(val, cf.key);
  S.fldIdx++;
  setTimeout(() => askNext(S.secIdx, S.fldIdx, S.data), 300);
}

function selOpt(val) {
  const fields = activeF(S.secIdx, S.data);
  const cf = fields[S.fldIdx];
  if (!cf) return;
  S.data[cf.key] = val;
  addUser(val, cf.key);
  S.fldIdx++;
  setTimeout(() => askNext(S.secIdx, S.fldIdx, S.data), 300);
}

function skip() {
  const fields = activeF(S.secIdx, S.data);
  const cf = fields[S.fldIdx];
  if (!cf) return;
  addUser('Skipped');
  S.fldIdx++;
  setTimeout(() => askNext(S.secIdx, S.fldIdx, S.data), 300);
}

async function handleFile(e) {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  const fields = activeF(S.secIdx, S.data);
  const cf = fields[S.fldIdx];
  const converted = [];
  for (const file of files) {
    try {
      const b64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
      converted.push({ name: file.name, data: b64, mimeType: file.type || 'application/octet-stream', size: file.size });
    } catch (err) {
      console.error('File read error:', err);
    }
  }
  S.files[cf.key] = [...(S.files[cf.key] || []), ...converted];
  addUser('📎 ' + converted.map(f => f.name).join(', '));
  await addAgent(`Received ${converted.length} file(s) ✓`, 250);
  S.fldIdx++;
  askNext(S.secIdx, S.fldIdx, S.data);
}

function skipFile() {
  addUser('Will provide later');
  S.fldIdx++;
  setTimeout(() => askNext(S.secIdx, S.fldIdx, S.data), 300);
}

function deleteFile(key, idx) {
  if (S.files[key]) {
    S.files[key].splice(idx, 1);
    if (!S.files[key].length) delete S.files[key];
    render();
  }
}

// ─── Voice Input ───
let recognition = null;
function toggleMic() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    alert('Speech recognition not supported in this browser.');
    return;
  }
  if (S.listening && recognition) {
    recognition.stop();
    S.listening = false;
    render();
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';
  S.listening = true;
  render();
  recognition.onresult = (e) => {
    const t = e.results[0][0].transcript;
    const inp = $('inp');
    if (inp) inp.value = t;
    S.listening = false;
    render();
    const sb = $('sendBtn');
    if (sb) sb.classList.add('active');
  };
  recognition.onend = () => { S.listening = false; render(); };
  recognition.onerror = () => { S.listening = false; render(); };
  recognition.start();
}

// ─── Edit field ───
function editField(key) {
  const fields = [];
  SECTIONS.forEach((sec, si) => {
    if (!sec.fields) return;
    sec.fields.forEach((f, fi) => {
      if (f.key === key) fields.push({ si, fi });
    });
  });
  if (!fields.length) return;
  const { si, fi } = fields[0];
  delete S.data[key];
  S.secIdx = si;
  S.fldIdx = fi;
  addAgent(`Let's update **${SECTIONS[si].fields[fi].label}**...`, 300).then(() => {
    askNext(si, fi, S.data);
  });
}

// ═══════════════════════════════════════════════════════════════
//  SUBMIT
// ═══════════════════════════════════════════════════════════════
async function submitListing() {
  if (S.submitting) return;
  S.submitting = true;
  render();
  await addAgent("Submitting your listing... 📤", 500);

  try {
    // ── Upload docs to Google Drive ──
    let driveLink = '';
    const allFiles = Object.entries(S.files);
    if (allFiles.length > 0) {
      const fileList = [];
      for (const [key, files] of allFiles) {
        for (const file of files) {
          fileList.push({ name: file.name, data: file.data, mimeType: file.mimeType });
        }
      }
      try {
        const res = await fetch('/.netlify/functions/upload-listing-docs', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            folderName: `Listing - ${S.data.propAddress || 'New'} - ${new Date().toLocaleDateString()}`,
            files: fileList,
          }),
        });
        const result = await res.json();
        if (result.folderLink) driveLink = result.folderLink;
      } catch (err) {
        console.error('Drive upload error:', err);
      }
    }

    // ── Build email summary ──
    const summary = buildSummary(driveLink);

    // ── Send email via EmailJS ──
    try {
      emailjs.init(EMAILJS_PUBLIC_KEY);
      await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
        to_email: 'nationrealtor@gmail.com',
        property_address: S.data.propAddress || 'N/A',
        listing_price: fmt(S.data.listPrice) || 'N/A',
        message: summary,
      });
    } catch (err) {
      console.error('EmailJS error:', err);
    }

    S.submitted = true;
    S.submitting = false;
    saveState();
    render();
    scrollChat();
  } catch (err) {
    console.error('Submit error:', err);
    S.submitting = false;
    await addAgent("There was an issue submitting. Please try again.", 300);
    render();
  }
}

function buildSummary(driveLink) {
  let s = '━━━ NEW LISTING SUBMISSION ━━━\n\n';
  SECTIONS.forEach(sec => {
    if (sec.greeting || sec.review || !sec.fields.length) return;
    const vals = sec.fields.filter(f => f.key && S.data[f.key]).map(f => `${f.label}: ${S.data[f.key]}`);
    if (vals.length) {
      s += `${sec.icon} ${sec.title}\n${vals.join('\n')}\n\n`;
    }
  });
  s += `🤝 Listing Agent: ${AGENT_INFO.agentName}\n`;
  s += `   ${AGENT_INFO.broker} | Lic. ${AGENT_INFO.license}\n`;
  s += `   ${AGENT_INFO.phone} | ${AGENT_INFO.email}\n`;
  if (driveLink) s += `\n📁 Documents: ${driveLink}\n`;
  return s;
}

// ─── PDF Download ───
function generatePDF() {
  // Simple text-based PDF download using jsPDF via CDN
  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
  script.onload = () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    let y = 20;
    const lm = 20;
    const pw = 170;

    // Header
    doc.setFillColor(192, 57, 43);
    doc.rect(0, 0, 210, 35, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(18);
    doc.setFont(undefined, 'bold');
    doc.text('Residential Real Estate Listing', lm, 15);
    doc.setFontSize(10);
    doc.setFont(undefined, 'normal');
    doc.text(`${AGENT_INFO.agentName} | ${AGENT_INFO.broker} | Lic. ${AGENT_INFO.license}`, lm, 24);
    doc.text(`${AGENT_INFO.phone} | ${AGENT_INFO.email}`, lm, 30);
    y = 45;

    doc.setTextColor(0, 0, 0);
    SECTIONS.forEach(sec => {
      if (sec.greeting || sec.review || !sec.fields.length) return;
      const vals = sec.fields.filter(f => f.key && S.data[f.key]);
      if (!vals.length) return;
      if (y > 260) { doc.addPage(); y = 20; }
      doc.setFontSize(12);
      doc.setFont(undefined, 'bold');
      doc.setTextColor(192, 57, 43);
      doc.text(`${sec.title}`, lm, y);
      y += 7;
      doc.setFontSize(10);
      doc.setFont(undefined, 'normal');
      doc.setTextColor(60, 60, 60);
      vals.forEach(f => {
        if (y > 275) { doc.addPage(); y = 20; }
        const line = `${f.label}: ${S.data[f.key]}`;
        const split = doc.splitTextToSize(line, pw);
        doc.text(split, lm, y);
        y += split.length * 5 + 2;
      });
      y += 5;
    });

    // Footer
    if (y > 260) { doc.addPage(); y = 20; }
    y += 10;
    doc.setDrawColor(192, 57, 43);
    doc.line(lm, y, lm + pw, y);
    y += 8;
    doc.setFontSize(9);
    doc.setTextColor(120, 120, 120);
    doc.text(`Generated by Realty AI — ${new Date().toLocaleDateString()}`, lm, y);
    doc.text(`nationrealtor.com | Powered by Axen Realty`, lm, y + 5);

    const addr = (S.data.propAddress || 'Property').replace(/[^a-zA-Z0-9]/g, '_');
    doc.save(`Listing_${addr}.pdf`);
  };
  document.head.appendChild(script);
}

// ═══════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════
function renderMsg(m) {
  if (m.type === 'agent') {
    return `<div class="msg agent"><div class="avatar"><img src="/logo.png" alt="RA" onerror="this.onerror=null;this.outerHTML='<span style=\\'color:#fff;font-size:11px;font-weight:700\\'>RA</span>'"/></div><div class="bubble">${md(m.text)}</div></div>`;
  }
  // User messages — tappable to edit (show pencil icon on hover)
  const isSkip = m.text === 'Skipped' || m.text === 'Will provide later';
  const isFile = m.text.startsWith('📎');
  return `<div class="msg user"><div class="avatar">You</div><div class="bubble" ${!isSkip && !isFile && m.fieldKey ? `onclick="editInline('${m.fieldKey}')" style="cursor:pointer" title="Tap to edit"` : ''}>${md(m.text)}${!isSkip && !isFile && m.fieldKey ? '<span class="edit-hint">✏️</span>' : ''}</div></div>`;
}

function editInline(key) {
  // Find which section/field this key belongs to
  for (let si = 0; si < SECTIONS.length; si++) {
    const sec = SECTIONS[si];
    if (!sec.fields) continue;
    for (let fi = 0; fi < sec.fields.length; fi++) {
      if (sec.fields[fi].key === key) {
        const oldVal = S.data[key];
        const newVal = prompt(`Edit "${sec.fields[fi].label}":`, oldVal || '');
        if (newVal !== null && newVal !== oldVal) {
          S.data[key] = newVal;
          // Update the message in chat
          const msgIdx = S.msgs.findIndex(m => m.fieldKey === key);
          if (msgIdx >= 0) S.msgs[msgIdx].text = newVal;
          saveState();
          render();
          scrollChat();
        }
        return;
      }
    }
  }
}

function renderReview() {
  let html = '<div class="review-card"><h3>📝 Listing Review</h3>';
  SECTIONS.forEach(sec => {
    if (sec.greeting || sec.review || !sec.fields.length) return;
    const vals = sec.fields.filter(f => f.key && S.data[f.key]);
    if (!vals.length) return;
    html += `<div class="rv-section"><div class="rv-title">${sec.icon} ${sec.title}</div>`;
    vals.forEach(f => {
      html += `<div class="rv-row"><span class="rv-label">${f.label}</span><span class="rv-val">${f.key === 'listPrice' ? fmt(S.data[f.key]) : S.data[f.key]}<button class="edit-btn" onclick="editField('${f.key}')">Edit</button></span></div>`;
    });
    html += '</div>';
  });

  // Show uploaded files
  const allFiles = Object.entries(S.files);
  if (allFiles.length > 0) {
    html += '<div class="rv-section"><div class="rv-title">📎 Uploaded Documents</div>';
    allFiles.forEach(([key, files]) => {
      files.forEach((f, i) => {
        html += `<div class="rv-row"><span class="rv-label">${f.name}</span><span class="rv-val">${(f.size / 1024).toFixed(0)} KB <button class="file-del" onclick="deleteFile('${key}',${i})">✕</button></span></div>`;
      });
    });
    html += '</div>';
  }

  // Agent info
  html += `<div class="rv-section"><div class="rv-title">🤝 Listing Agent</div>`;
  html += `<div class="rv-row"><span class="rv-label">Agent</span><span class="rv-val">${AGENT_INFO.agentName}</span></div>`;
  html += `<div class="rv-row"><span class="rv-label">Brokerage</span><span class="rv-val">${AGENT_INFO.broker}</span></div>`;
  html += `<div class="rv-row"><span class="rv-label">License</span><span class="rv-val">${AGENT_INFO.license}</span></div>`;
  html += `<div class="rv-row"><span class="rv-label">Phone</span><span class="rv-val">${AGENT_INFO.phone}</span></div>`;
  html += `<div class="rv-row"><span class="rv-label">Email</span><span class="rv-val">${AGENT_INFO.email}</span></div>`;
  html += `<div class="rv-row"><span class="rv-label">Office</span><span class="rv-val">${AGENT_INFO.brokerageAddress}</span></div>`;
  html += '</div>';

  html += `<div class="review-actions">`;
  html += `<button class="btn-primary" onclick="submitListing()" ${S.submitting ? 'disabled' : ''}>${S.submitting ? '⏳ Submitting...' : '📤 Submit Listing'}</button>`;
  html += `<button class="btn-outline" onclick="generatePDF()">📄 Download PDF</button>`;
  html += `<button class="btn-outline" onclick="resetAll()">🔄 Start Over</button>`;
  html += `</div></div>`;
  return html;
}

function renderSuccess() {
  return `<div class="success-card"><div class="check">✓</div><h3>Listing Submitted Successfully!</h3><p>Your Residential Real Estate Listing has been submitted and a notification has been sent to your agent.</p><p style="margin-top:12px;font-size:12px;color:var(--text-light)"><strong style="color:var(--dark)">Next Steps:</strong><br>1. Agent reviews listing details<br>2. Professional photos scheduled<br>3. Property goes live on MLS<br>4. Marketing campaign launches</p><div class="success-actions"><button class="btn-primary" onclick="generatePDF()">📄 Download PDF</button><button class="btn-outline" onclick="goBack()">← Dashboard</button><button class="btn-outline" onclick="resetAll()">+ New Listing</button></div></div>`;
}

function render() {
  const sec = SECTIONS[S.secIdx];
  const p = getPercent();
  const fields = activeF(S.secIdx, S.data);
  // Skip past notice fields to find the actual current interactive field
  let cfIdx = S.fldIdx;
  while (cfIdx < fields.length && fields[cfIdx].type === 'notice') cfIdx++;
  const cf = cfIdx < fields.length ? fields[cfIdx] : null;
  const isSelect = cf && cf.type === 'select';
  const isFile = cf && cf.type === 'file';
  const isReview = sec && sec.review;
  const isMobile = window.innerWidth <= 768;
  const sidebarClass = `sidebar${isMobile ? (S.showMobileSB ? ' show-mobile' : '') : ''}`;

  $('app').innerHTML = `
    ${isMobile && S.showMobileSB ? '<div class="sidebar-overlay show" onclick="toggleSB()"></div>' : ''}
    <div class="${sidebarClass}">
      ${isMobile ? '<button class="sidebar-close" onclick="toggleSB()">✕</button>' : ''}
      <button class="sidebar-back" onclick="goBack()">← Back to Realty AI</button>
      <div class="sb-logo"><img src="/logo.png" alt="RA" onerror="this.onerror=null;this.outerHTML='<div style=\\'width:56px;height:56px;border-radius:12px;background:linear-gradient(135deg,#C0392B,#e74c3c);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:700;box-shadow:0 4px 16px rgba(192,57,43,.15)\\'>RA</div>'"/></div>
      <div class="s-header">
        <div class="label">Listing Agent</div>
        <h2>Residential Real Estate Listing</h2>
      </div>
      <div class="prog">
        <div class="row"><span>Progress</span><span>${p}%</span></div>
        <div class="prog-track"><div class="prog-fill" style="width:${p}%"></div></div>
      </div>
      <div class="nav">
        ${SECTIONS.filter(s => !s.greeting).map((s, i) => {
          const ri = i + 1;
          const cls = S.secIdx === ri ? 'active' : S.secIdx > ri ? 'complete' : 'pending';
          return `<div class="nav-item ${cls}"><span class="ic">${S.secIdx > ri ? '✓' : s.icon}</span><span>${s.title}</span></div>`;
        }).join('')}
      </div>
      <div class="lo">
        <div class="t">Your Listing Agent</div>
        <div><strong>${AGENT_INFO.agentName}</strong></div>
        <div>${AGENT_INFO.broker} | Lic. ${AGENT_INFO.license}</div>
        <div>${AGENT_INFO.email}</div>
        <div>${AGENT_INFO.phone}</div>
        <div style="margin-top:6px">nationrealtor.com<br>Powered by Axen Realty</div>
      </div>
    </div>

    <div class="main">
      <div class="topbar">
        <div class="topbar-left">
          <button class="menu-btn" onclick="toggleSB()">☰</button>
          <div>
            <div class="topbar-title">${sec?.icon || ''} ${sec?.title || ''}</div>
            <div class="topbar-sub">Section ${S.secIdx} of ${SECTIONS.length - 1}</div>
          </div>
        </div>
        <div class="topbar-badge">${p}% Complete</div>
      </div>

      <div class="chat" id="chatArea">
        ${S.msgs.map(m => renderMsg(m)).join('')}
        ${S.typing ? '<div class="typing-wrap"><div class="typing-b"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>' : ''}
        ${isReview && !S.submitted ? renderReview() : ''}
        ${S.submitted ? renderSuccess() : ''}
      </div>

      ${!isReview && !S.submitted ? `
      <div class="input-area">
        ${isSelect && cf?.opts ? `<div class="sel-opts">${cf.opts.map(o => `<button class="opt-btn" onclick="selOpt('${o.replace(/'/g, "\\'")}')">${o}</button>`).join('')}</div>` : ''}
        ${isFile ? `
          <div class="file-row">
            <button class="upload-btn" onclick="document.getElementById('fInp').click()">📎 Upload Files</button>
            <button class="file-skip-btn" onclick="skipFile()">Provide Later</button>
          </div>
          <input type="file" id="fInp" style="display:none" multiple accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" onchange="handleFile(event)"/>
          ${S.files[cf?.key]?.length ? `<div class="file-list">${S.files[cf.key].map((f, i) => `<div class="file-item"><span>📄 ${f.name}</span><button class="file-del" onclick="deleteFile('${cf.key}',${i})">✕</button></div>`).join('')}</div>` : ''}
        ` : `
          <div class="input-row">
            <input class="chat-input" id="inp" type="text" placeholder="${cf ? 'Type your ' + cf.label.toLowerCase() + '...' : 'Type...'}" onkeydown="if(event.key==='Enter')send()"/>
            <button class="send-btn" id="sendBtn" onclick="send()">Send</button>
            ${cf && !cf.req ? '<button class="skip-btn" onclick="skip()">Skip</button>' : ''}
          </div>
          <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px">
            <button class="mic-btn ${S.listening ? 'listening' : ''}" onclick="toggleMic()" title="${S.listening ? 'Stop listening' : 'Tap to speak'}">
              <svg width="20" height="20" fill="none" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" fill="currentColor"/><path d="M19 10v2a7 7 0 0 1-14 0v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M12 19v4m-4 0h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
            <span style="font-size:10px;color:${S.listening ? 'var(--red)' : 'var(--text-light)'};font-weight:${S.listening ? '600' : '400'}">${S.listening ? 'Listening... tap to stop' : 'or tap to speak'}</span>
          </div>
        `}
        <div class="disclaimer">🔒 Encrypted & secure. Powered by Realty AI.</div>
      </div>
      ` : ''}
    </div>
  `;

  // Auto-activate send button
  const inp = $('inp');
  const sb = $('sendBtn');
  if (inp && sb) {
    inp.addEventListener('input', () => {
      sb.classList.toggle('active', inp.value.trim().length > 0);
    });
  }
}

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
async function init() {
  // Check if resuming from saved state
  if (S.secIdx > 0 && S.msgs.length > 0) {
    // Resuming — just render and pick up where left off
    render();
    scrollChat();
    await addAgent("Welcome back! Let's continue where you left off.", 600);
    const sec = SECTIONS[S.secIdx];
    if (sec && !sec.review && !sec.greeting) {
      await addAgent(`We're on **${sec.icon} ${sec.title}**...`, 400);
      askNext(S.secIdx, S.fldIdx, S.data);
    } else if (sec && sec.review) {
      render();
    }
    return;
  }

  // Fresh start
  render();
  await addAgent(`Welcome to the **Listing Agent** by Nation Realtor.`, 800);
  await addAgent(`I'll walk you through your **Residential Real Estate Listing** — section by section.`, 600);
  await addAgent(`Your listing agent is **${AGENT_INFO.agentName}** at **${AGENT_INFO.broker}**.`, 500);
  if (SHARED_CTX.propertyAddress) {
    await addAgent(`I see you're listing **${SHARED_CTX.propertyAddress}**${SHARED_CTX.listingPrice ? ' at ' + fmt(SHARED_CTX.listingPrice) : ''}.`, 500);
  }
  await addAgent(`Let's begin with **${SECTIONS[1].icon} ${SECTIONS[1].title}**...`, 400);
  S.secIdx = 1;
  S.fldIdx = 0;
  saveState();
  render();
  setTimeout(() => askNext(1, 0, S.data), 800);
}

init();
</script>
</body>
</html>
