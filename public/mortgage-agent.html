<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#C0392B;--red-light:#e74c3c;--red-bg:rgba(192,57,43,.06);--red-border:rgba(192,57,43,.15);--bg:#fff;--bg-subtle:#F8F7F5;--bg-chat:#FAFAF9;--text:#1a1a1a;--text-mid:#555;--text-light:#999;--border:#E8E6E1;--border-light:#F0EEEA;--shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 16px rgba(0,0,0,.08)}
body{font-family:'Outfit',sans-serif;background:var(--bg-subtle);color:var(--text);height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:290px;display:flex;flex-direction:column;background:var(--bg);border-right:1px solid var(--border);transition:width .3s;overflow:hidden}.sidebar.collapsed{width:0}

.s-brand{padding:24px 20px 16px;border-bottom:1px solid var(--border-light)}.s-brand .logo{display:flex;align-items:center;gap:10px;margin-bottom:12px}.s-brand .logo-icon{width:36px;height:36px;border-radius:8px;overflow:hidden;flex-shrink:0}.s-brand .logo-icon img{width:100%;height:100%;object-fit:cover}.s-brand .logo-text{font-size:18px;font-weight:700;color:var(--text)}.s-brand .logo-text span{color:var(--red)}.s-brand h2{font-family:'Source Serif 4',serif;font-size:22px;font-weight:600;color:var(--text);line-height:1.2;margin-top:4px}.s-brand .sub{font-size:12px;color:var(--text-light);margin-top:6px}.s-brand .badge-15{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,var(--red),var(--red-light));color:#fff;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;margin-top:10px;letter-spacing:.5px}
.prog{padding:16px 20px;border-bottom:1px solid var(--border-light)}.prog .row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px}.prog .row span:first-child{color:var(--text-light);font-weight:500}.prog .row span:last-child{color:var(--red);font-weight:700}.prog-track{height:5px;background:var(--border-light);border-radius:3px;overflow:hidden}.prog-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1);background:linear-gradient(90deg,var(--red),var(--red-light))}

.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg-chat)}

.msg{display:flex;animation:fadeIn .35s ease}.msg.user{justify-content:flex-end}.msg.agent{justify-content:flex-start}

.success-box{background:linear-gradient(135deg,#f0faf0,#e8f8e8);border:1px solid rgba(39,174,96,.2);border-radius:12px;padding:24px;margin-top:16px;text-align:center}.success-box .check{font-size:48px;margin-bottom:8px}.success-box h4{color:#27ae60;font-size:18px}.success-box .loan-num{font-family:'Source Serif 4',serif;font-size:24px;color:var(--text);font-weight:600;margin:8px 0}.success-box .dash-btn{margin-top:16px;padding:12px 28px;border-radius:10px;border:none;background:var(--red);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}.success-box .dash-btn:hover{background:var(--red-light)}
.input-area{padding:16px 24px;border-top:1px solid var(--border);background:var(--bg)}
.sel-opts{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}.opt-btn{padding:8px 16px;border-radius:20px;border:1px solid var(--red-border);background:var(--red-bg);color:var(--red);font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .2s}.opt-btn:hover{background:var(--red);color:#fff;border-color:var(--red)}
.input-row{display:flex;gap:10px}.chat-input{flex:1;padding:13px 16px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;outline:none;font-family:inherit;transition:all .2s}.chat-input:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(192,57,43,.08)}.chat-input::placeholder{color:#bbb}
.send-btn{padding:13px 22px;border-radius:10px;border:none;background:var(--border-light);color:#bbb;font-size:14px;font-weight:700;cursor:default;font-family:inherit;transition:all .2s}.send-btn.active{background:var(--red);color:#fff;cursor:pointer}.send-btn.active:hover{background:var(--red-light)}
.skip-btn{padding:13px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text-light);font-size:12px;cursor:pointer;font-family:inherit;font-weight:500}.skip-btn:hover{border-color:var(--red-border);color:var(--red)}
.file-row{display:flex;gap:10px}.upload-btn{flex:1;padding:14px;border-radius:10px;border:2px dashed var(--red-border);background:var(--red-bg);color:var(--red);font-size:14px;cursor:pointer;font-weight:600;font-family:inherit}.upload-btn:hover{background:rgba(192,57,43,.12);border-color:var(--red)}.file-skip-btn{padding:14px 18px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text-light);font-size:13px;cursor:pointer;font-family:inherit}
.disclaimer{font-size:11px;color:var(--text-light);margin-top:10px;text-align:center;line-height:1.4}
.prop-banner{background:linear-gradient(135deg,var(--red-bg),rgba(192,57,43,.03));border:1px solid var(--red-border);border-radius:12px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:12px}.prop-banner .prop-icon{width:40px;height:40px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0}.prop-banner .prop-info{font-size:13px;color:var(--text-mid);line-height:1.4}.prop-banner .prop-info strong{color:var(--text);display:block;font-size:14px}
.edit-btn{display:inline-block;margin-left:8px;padding:2px 8px;border-radius:6px;border:1px solid var(--red-border);background:var(--red-bg);color:var(--red);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;vertical-align:middle;transition:all .2s}.edit-btn:hover{background:var(--red);color:#fff;border-color:var(--red)}

@keyframes pulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1.1)}}
@keyframes shimmer{0%{left:-100%}100%{left:200%}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@media(max-width:768px){.sidebar{position:fixed;z-index:100;height:100vh;width:0;overflow:hidden}.sidebar.show-mobile{width:280px}.bubble{max-width:88%!important}.rg,.highlight-grid{grid-template-columns:1fr}}

    {key:"_coDocNotice",label:"",type:"notice",msg:"Now let's get your co-borrower's documents.",cond:d=>d.creditType==="Joint (Co-Borrower)"},
    {key:"coUp1",label:"Co-Borrower Pay Stubs",type:"file",req:false,cond:d=>d.creditType==="Joint (Co-Borrower)",q:"Upload co-borrower's 2 most recent pay stubs."},
    {key:"coUp2",label:"Co-Borrower Bank Statements",type:"file",req:false,cond:d=>d.creditType==="Joint (Co-Borrower)",q:"Upload co-borrower's 2 most recent bank statements."},
    {key:"coUp3",label:"Co-Borrower Photo ID",type:"file",req:false,cond:d=>d.creditType==="Joint (Co-Borrower)",q:"Upload co-borrower's government-issued photo ID."},
  ]},
  {id:"review",title:"Review & Submit",icon:"🚀",fields:[],review:true},
];

let S={data:{},files:{},secIdx:0,fldIdx:0,msgs:[],typing:false,submitting:false,submitted:false,result:null,sidebarOpen:window.innerWidth>768};
if(P.address)S.data.propertyStreet=P.address;if(P.city)S.data.propertyCity=P.city;if(P.state)S.data.propertyState=P.state;if(P.zip)S.data.propertyZip=P.zip;if(P.price)S.data.propertyValue=P.price;if(P.type)S.data.propertyType=P.type;

function af(si,d){const s=SECTIONS[si];if(!s||!s.fields)return[];return s.fields.filter(f=>{if(f.type==='computed')return false;if(f.cond)return f.cond(d);return true;});}
function pct(){let t=0,f=0;SECTIONS.forEach(s=>{if(s.greeting||s.review)return;s.fields.filter(x=>x.type!=='computed'&&x.type!=='notice'&&x.type!=='file'&&(x.cond?x.cond(S.data):x.req)).forEach(x=>{t++;if(S.data[x.key])f++;});});return t?Math.round(f/t*100):0;}
function fmt(t){return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br/>');}
function render(){
  const sec=SECTIONS[S.secIdx],fields=af(S.secIdx,S.data),cf=fields[S.fldIdx],p=pct(),isReview=sec?.review,isSelect=cf?.type==='select',isFile=cf?.type==='file',hasProp=P.address||P.price;
  const isMobile=window.innerWidth<=768;
  const sidebarClass=isMobile?(S.sidebarOpen?'sidebar show-mobile':'sidebar'):(S.sidebarOpen?'sidebar':'sidebar collapsed');
  document.getElementById('app').innerHTML=`<div class="${sidebarClass}"><button class="sidebar-back" onclick="navBack()">← Back to Realty AI</button><div class="s-brand"><div class="logo"><div class="logo-icon"><img src="/logo.png" alt="Realty AI"/></div><div class="logo-text">Realty <span>AI</span></div></div><h2>Mortgage Application</h2><div class="sub">Uniform Residential Loan Application</div><div class="badge-15">⚡ Get Approved!</div></div><div class="prog"><div class="row"><span>Progress</span><span>${p}%</span></div><div class="prog-track"><div class="prog-fill" style="width:${p}%"></div></div></div><div class="nav">${SECTIONS.filter(s=>!s.greeting).map((s,i)=>{const ri=i+1,cls=S.secIdx===ri?'active':S.secIdx>ri?'complete':'pending';return`<div class="nav-item ${cls}"><span class="ic">${S.secIdx>ri?'✓':s.icon}</span><span>${s.title}</span></div>`;}).join('')}</div><div class="lo"><div class="t">Your Loan Officer</div><div><strong>${LO.name}</strong></div><div>NMLS# ${LO.nmls} • ${LO.orgName}</div><div>${LO.email}</div><div>${LO.phone}</div></div></div><div class="main"><div class="topbar"><div class="topbar-left"><button class="menu-btn" onclick="toggleSB()">☰</button><div><div class="topbar-title">${sec?.icon||''} ${sec?.title||''}</div><div class="topbar-sub">Section ${S.secIdx} of ${SECTIONS.length-1}</div></div></div><div class="topbar-badge">${p}% Complete</div></div><div class="chat" id="chatArea">${hasProp&&S.msgs.length<=1?`<div class="prop-banner"><div class="prop-icon">🏠</div><div class="prop-info"><strong>${P.address||'Selected Property'}</strong>${P.price?'$'+Number(P.price).toLocaleString():''} ${P.city?'• '+P.city+', '+P.state:''}</div></div>`:''}${S.msgs.map((m,i)=>renderMsg(m,i)).join('')}${S.typing?`<div class="typing-wrap"><div class="typing-b"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>`:''}${isReview&&!S.submitted?renderReview():''}${S.submitted?renderSuccess():''}</div>${!isReview&&!S.submitted?`<div class="input-area">${isSelect&&cf?.opts?`<div class="sel-opts">${cf.opts.map(o=>`<button class="opt-btn" onclick="selOpt('${o.replace(/'/g,"\\'")}')">${o}</button>`).join('')}</div>`:''}${isFile?`<div class="file-row"><button class="upload-btn" onclick="document.getElementById('fInp').click()">📎 Upload Files</button><button class="file-skip-btn" onclick="skipFile()">Provide Later</button></div><input type="file" id="fInp" style="display:none" multiple accept=".pdf,.jpg,.jpeg,.png" onchange="handleFile(event)"/>`:`<div class="input-row"><input class="chat-input" id="inp" type="${cf?.type==='ssn'?'password':'text'}" placeholder="${cf?'Type your '+cf.label.toLowerCase()+'...':'Type...'}" onkeydown="if(event.key==='Enter')send()"/><button class="send-btn" id="sendBtn" onclick="send()">Send</button>${cf&&!cf.req?'<button class="skip-btn" onclick="skip()">Skip</button>':''}</div>`}<div class="disclaimer">🔒 Encrypted & secure. By proceeding you consent to a credit inquiry.</div></div>`:''}</div>`;
  const ca=document.getElementById('chatArea');if(ca)ca.scrollTop=ca.scrollHeight;const inp=document.getElementById('inp');if(inp){inp.focus();inp.addEventListener('input',()=>{const b=document.getElementById('sendBtn');if(b){inp.value.trim()?b.classList.add('active'):b.classList.remove('active');}});}
}
function renderReview(){let h='<div class="review-card"><h3>📋 Application Summary</h3><div class="highlight-box"><div class="highlight-grid"><div><div class="hl">Purchase Price</div><div class="hv price">$'+Number(S.data.propertyValue||0).toLocaleString()+'</div></div><div><div class="hl">Loan Amount</div><div class="hv">$'+Number(S.data.loanAmount||0).toLocaleString()+'</div></div><div><div class="hl">Loan Type</div><div class="hv">'+(S.data.financingType||'—')+'</div></div><div><div class="hl">Occupancy</div><div class="hv">'+(S.data.occupancy||'—')+'</div></div></div></div>';SECTIONS.filter(s=>!s.greeting&&!s.review&&s.fields.length).forEach(sec=>{const filled=sec.fields.filter(f=>f.type!=='computed'&&f.type!=='notice'&&f.type!=='file'&&S.data[f.key]);if(!filled.length)return;h+='<div class="rs-title">'+sec.icon+' '+sec.title+'</div><div class="rg">';filled.forEach(f=>{const v=f.sensitive?'•••••'+S.data[f.key].slice(-4):S.data[f.key];h+='<div class="rf"><span class="l">'+f.label+': </span><span class="v">'+v+'</span></div>';});h+='</div>';});h+='<div class="rs-title">🏦 Loan Officer</div><div style="font-size:13px;color:var(--text-mid);margin-bottom:24px">'+LO.name+' • NMLS# '+LO.nmls+'<br/>'+LO.orgName+' • '+LO.email+'</div>';h+='<button class="submit-btn" '+(S.submitting?'disabled':'')+' onclick="submitApp()"><span class="shimmer"></span>'+(S.submitting?'⏳ Submitting to LendingPad...':'⚡ Submit — Get Approved!')+'</button></div>';return h;}
function renderSuccess(){if(!S.result)return'';return'<div class="success-box"><div class="check">✅</div><h4>Application Submitted!</h4><div class="loan-num">Loan #'+S.result.ln+'</div><p style="color:var(--text-mid);font-size:14px">Created in LendingPad • Assigned to '+LO.name+'</p><p style="color:var(--text-light);font-size:13px;margin-top:8px">Reviewing against <strong>250+ lenders</strong> for best rate. Expect a call within 15 minutes.</p><button class="dash-btn" onclick="navBack()">← Return to Realty AI</button></div>';}
function addAgent(t,d=500,fieldKey=null){S.typing=true;render();return new Promise(r=>{setTimeout(()=>{S.msgs.push({type:'agent',text:t,fieldKey:fieldKey,editing:false});S.typing=false;render();r();},d);});}
function addUser(t){S.msgs.push({type:'user',text:t});render();}
function renderMsg(m,i){
  if(m.type==='user') return`<div class="msg user"><div class="bubble">${fmt(m.text)}</div></div>`;
  // Agent confirmation messages with fieldKey get edit functionality
  if(m.fieldKey && S.data[m.fieldKey] && !S.submitted){
    if(m.editing){
      // Show inline edit input
      const f=findField(m.fieldKey);
      const isSelect=f&&f.type==='select';
      const val=f&&f.sensitive?'':S.data[m.fieldKey]||'';
      let editHTML=`<div class="msg agent"><div class="bubble" style="min-width:280px"><strong>${f?f.label:''}:</strong> Editing...<br/><div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">`;
      if(isSelect&&f.opts){
        f.opts.forEach(o=>{editHTML+=`<button class="opt-btn" onclick="saveEdit('${m.fieldKey}',${i},'${o.replace(/'/g,"\\'")}')">${o}</button>`;});
      } else {
        editHTML+=`<input id="editInp${i}" type="${f&&f.type==='ssn'?'password':'text'}" value="${val}" style="flex:1;padding:8px 12px;border:1.5px solid var(--red);border-radius:8px;font-size:13px;font-family:inherit;outline:none;min-width:150px" onkeydown="if(event.key==='Enter')saveEdit('${m.fieldKey}',${i},this.value)"/>`;
        editHTML+=`<button onclick="saveEdit('${m.fieldKey}',${i},document.getElementById('editInp${i}').value)" style="padding:8px 14px;border-radius:8px;border:none;background:var(--red);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Save</button>`;
      }
      editHTML+=`<button onclick="cancelEdit(${i})" style="padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text-light);font-size:12px;cursor:pointer;font-family:inherit">Cancel</button>`;
      editHTML+=`</div></div></div>`;
      return editHTML;
    }
    // Normal confirmation with edit button
    return`<div class="msg agent"><div class="bubble">${fmt(m.text)} <button class="edit-btn" onclick="startEdit(${i})">✏️ Edit</button></div></div>`;
  }
  return`<div class="msg agent"><div class="bubble">${fmt(m.text)}</div></div>`;
}
function findField(key){
  for(let si=0;si<SECTIONS.length;si++){
    const fields=SECTIONS[si].fields||[];
    for(let fi=0;fi<fields.length;fi++){
      if(fields[fi].key===key)return fields[fi];
    }
  }
  return null;
}
function startEdit(msgIdx){
  S.msgs[msgIdx].editing=true;
  render();
  // Focus the input if it exists
  setTimeout(()=>{const inp=document.getElementById('editInp'+msgIdx);if(inp)inp.focus();},100);
}
function cancelEdit(msgIdx){
  S.msgs[msgIdx].editing=false;
  render();
}
function saveEdit(fieldKey,msgIdx,newValue){
  if(!newValue||!newValue.trim())return;
  newValue=newValue.trim();
  // Update the data
  S.data[fieldKey]=newValue;
  // Update the confirmation message text
  const f=findField(fieldKey);
  const disp=f&&f.sensitive?'•••••'+newValue.slice(-4):newValue;
  S.msgs[msgIdx].text=`**${f?f.label:fieldKey}**: ${disp} ✓`;
  S.msgs[msgIdx].editing=false;
  // Also update the user message right before this confirmation (msgIdx-1)
  if(msgIdx>0&&S.msgs[msgIdx-1].type==='user'){
    S.msgs[msgIdx-1].text=f&&f.sensitive?'•••••'+newValue.slice(-4):newValue;
  }
  render();
}
async function askNext(si,fi,d){const fields=af(si,d);if(fi>=fields.length){const nsi=si+1;if(nsi>=SECTIONS.length){S.secIdx=SECTIONS.length-1;render();return;}const ns=SECTIONS[nsi];if(ns.review){await addAgent("Review your application and submit when ready.");S.secIdx=nsi;render();return;}// Check if next section has any active fields — if not, skip it
    const nextFields=af(nsi,d);if(nextFields.length===0&&!ns.review&&!ns.greeting){S.secIdx=nsi;S.fldIdx=0;return askNext(nsi,0,d);}await addAgent(`Moving to **${ns.icon} ${ns.title}**...`,300);S.secIdx=nsi;S.fldIdx=0;render();setTimeout(()=>askNext(nsi,0,d),600);return;}const f=fields[fi];if(f.type==='notice'){await addAgent(f.msg,300);S.fldIdx=fi+1;render();setTimeout(()=>askNext(si,fi+1,d),400);return;}if(f.key==='propertyStreet'&&S.data.propertyStreet){await addAgent(`I see you're looking at **${S.data.propertyStreet}**${S.data.propertyCity?', '+S.data.propertyCity:''}${S.data.propertyValue?' — $'+Number(S.data.propertyValue).toLocaleString():''}. I've pre-filled the property details.`);let skip=fi;while(skip<fields.length&&S.data[fields[skip]?.key])skip++;if(skip>fi){S.fldIdx=skip;setTimeout(()=>askNext(si,skip,d),700);return;}}await addAgent(f.q);S.fldIdx=fi;render();}
function send(){const inp=document.getElementById('inp');const v=inp?.value?.trim();if(!v)return;processInput(v);}
function selOpt(v){processInput(v);}
function skip(){addUser('skip');S.fldIdx++;setTimeout(()=>askNext(S.secIdx,S.fldIdx,S.data),300);}
function skipFile(){addUser("I'll provide later");addAgent("No problem ✓",200).then(()=>{S.fldIdx++;askNext(S.secIdx,S.fldIdx,S.data);});}
function handleFile(e){const files=Array.from(e.target.files);if(!files.length)return;const fields=af(S.secIdx,S.data),cf=fields[S.fldIdx];S.files[cf.key]=[...(S.files[cf.key]||[]),...files];addUser('📎 '+files.map(f=>f.name).join(', '));addAgent(`Received ${files.length} file(s) ✓`,200).then(()=>{S.fldIdx++;askNext(S.secIdx,S.fldIdx,S.data);});}
async function processInput(v){const fields=af(S.secIdx,S.data),cf=fields[S.fldIdx];addUser(v);if(cf){if((v.toLowerCase()==='skip'||v.toLowerCase()==='none')&&!cf.req){S.fldIdx++;setTimeout(()=>askNext(S.secIdx,S.fldIdx,S.data),300);return;}S.data[cf.key]=v;const disp=cf.sensitive?'•••••'+v.slice(-4):v;await addAgent(`**${cf.label}**: ${disp} ✓`,200,cf.key);const naf=af(S.secIdx,S.data),nfi=S.fldIdx+1;if(nfi<naf.length){S.fldIdx=nfi;setTimeout(()=>askNext(S.secIdx,nfi,S.data),300);}else{const nsi=S.secIdx+1;if(nsi<SECTIONS.length){const ns=SECTIONS[nsi];if(ns.review){await addAgent("Review your application and submit when ready.");S.secIdx=nsi;render();}else{await addAgent(`Moving to **${ns.icon} ${ns.title}**...`,300);S.secIdx=nsi;S.fldIdx=0;render();setTimeout(()=>askNext(nsi,0,S.data),600);}}}}}
async function submitApp(){S.submitting=true;render();await addAgent("⚡ Submitting to LendingPad...");
try{
const isJoint=S.data.creditType==='Joint (Co-Borrower)';
const coAddr=S.data.coSameAddress==='Yes';
const payload={
  borrowerFirstName:S.data.firstName,
  borrowerLastName:S.data.lastName,
  borrowerEmail:S.data.email,
  borrowerMobilePhone:S.data.cellPhone,
  borrowerSsn:S.data.ssn,
  borrowerBirthDate:S.data.dob,
  borrowerCurrentAddressStreet:S.data.currentStreet,
  borrowerCurrentAddressCity:S.data.currentCity,
  borrowerCurrentAddressState:S.data.currentState,
  borrowerCurrentAddressZipCode:S.data.currentZip,
  purpose:S.data.loanPurpose,
  loanType:S.data.financingType,
  loanAmount:S.data.loanAmount,
  purchasePrice:S.data.propertyValue,
  occupancy:S.data.occupancy,
  propertyType:S.data.propertyType,
  units:S.data.numUnits,
  subjectPropertyAddressStreet:S.data.propertyStreet,
  subjectPropertyAddressCity:S.data.propertyCity,
  subjectPropertyAddressState:S.data.propertyState,
  subjectPropertyAddressZipCode:S.data.propertyZip,
  loanOfficerEmail:'gdifazio@nexalending.com',
  loanOfficerNmlsId:'1913560',
  note:'Submitted via Realty AI Mortgage Agent'+(isJoint?' — Joint Application':''),
  isJoint:isJoint?'true':'false'
};
if(isJoint){
  payload.coBorrowerFirstName=S.data.coFirstName;
  payload.coBorrowerLastName=S.data.coLastName;
  payload.coBorrowerEmail=S.data.coEmail;
  payload.coBorrowerSsn=S.data.coSsn;
  payload.coBorrowerBirthDate=S.data.coDob;
  payload.coBorrowerMobilePhone=S.data.coCellPhone;
  payload.coBorrowerCurrentAddressStreet=coAddr?S.data.currentStreet:S.data.coCurrentStreet;
  payload.coBorrowerCurrentAddressCity=coAddr?S.data.currentCity:S.data.coCurrentCity;
  payload.coBorrowerCurrentAddressState=coAddr?S.data.currentState:S.data.coCurrentState;
  payload.coBorrowerCurrentAddressZipCode=coAddr?S.data.currentZip:S.data.coCurrentZip;
}
const params=new URLSearchParams(payload);
const res=await fetch('https://hooks.zapier.com/hooks/catch/23175236/up1kjr5/',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:params.toString()});
if(!res.ok)throw new Error('Webhook failed: '+res.status);
const result=await res.json().catch(()=>({}));
const ln=result.id||('RA'+Date.now().toString().slice(-6));
S.result={ln};S.submitted=true;S.submitting=false;
await addAgent(`🎉 **Application Submitted!**\n\nLoan **#${ln}** created in LendingPad.\n\nReviewing against **250+ lenders** for the best rate. Expect a call within 15 minutes.`);
}catch(err){
console.error('Submit error:',err);
S.submitting=false;
await addAgent(`⚠️ There was an issue submitting. Please try again or contact your loan officer directly at ${LO.phone}.`);
render();
}}
function toggleSB(){S.sidebarOpen=!S.sidebarOpen;render();}
function navBack(){if(document.referrer)window.location.href=document.referrer;else window.location.href='https://realtyai.netlify.app';}
// ═══ INIT — Straight to first question ═══
async function init(){S.secIdx=1;S.fldIdx=0;render();setTimeout(()=>askNext(1,0,S.data),500);}
init();
</script>
